name: Frontend CI/CD Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Frontend via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/ChatProjesi/chat-client
            git fetch --all
            git reset --hard origin/main
            
            cd ~/ChatProjesi
            # 1. Compose Bug'ını atlamak için eski sistemi zorla durdur ve sil
            sudo docker-compose stop client
            sudo docker-compose rm -f client
            
            # 2. Yeni siyah-sarı tasarımı temiz bir şekilde ayağa kaldır
            DOCKER_BUILDKIT=0 sudo docker-compose up -d --build client