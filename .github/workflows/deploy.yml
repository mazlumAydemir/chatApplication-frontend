name: Frontend CI/CD Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Frontend via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Kodları hatasız ve zorla GitHub'dan çek (Git Tıkanıklığı Çözümü)
            cd ~/ChatProjesi/chat-client
            git fetch --all
            git reset --hard origin/main
            
            # 2. RAM'i şişirmeden sadece değişenleri derle (Akıllı Derleme)
            cd ~/ChatProjesi
            DOCKER_BUILDKIT=0 sudo docker-compose up -d --build client