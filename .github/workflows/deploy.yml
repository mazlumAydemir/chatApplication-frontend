name: Frontend CI/CD Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Frontend via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/ChatProjesi/chat-client
            
            # 1. GİT TIKANIKLIĞINI ÇÖZ: Sunucudaki her şeyi zorla GitHub'dakiyle aynı yap
            git fetch --all
            git reset --hard origin/main
            
            cd ~/ChatProjesi
            
            # 2. DOCKER TEMBELLİĞİNİ ÇÖZ: Eski hafızayı (--no-cache) sil ve sıfırdan inşa et
            DOCKER_BUILDKIT=0 sudo docker-compose build --no-cache client
            DOCKER_BUILDKIT=0 sudo docker-compose up -d client